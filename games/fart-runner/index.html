<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fart Runner</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #2d5a3d 0%, #1a3d2e 100%);
            color: #d4af37;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        
        #gameContainer {
            width: 800px;
            height: 600px;
            border: 3px solid #d4af37;
            border-radius: 10px;
            position: relative;
            background: #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        
        #gameCanvas {
            border-radius: 7px;
            display: block;
        }
        
        #gameUI {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #d4af37;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        
        .instructions {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #d4af37;
            font-size: 14px;
        }
        
        .powerup {
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: radial-gradient(circle, #4d7a5d 0%, #2d5a3d 100%);
            border: 2px solid #d4af37;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="gameUI">
            Score: <span id="score">0</span> | Farts: <span id="farts">3</span>
        </div>
        <div class="instructions">
            Arrow Keys: Move | Space: Jump | Collect Green Fart Power-ups
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const fartsElement = document.getElementById('farts');
        
        let score = 0;
        let farts = 3;
        let gameRunning = true;
        
        // Player
        const player = {
            x: 100,
            y: 400,
            width: 40,
            height: 40,
            speed: 5,
            jumpPower: 12,
            velocityY: 0,
            isJumping: false,
            color: '#d4af37'
        };
        
        // Platform
        const platforms = [
            { x: 0, y: 500, width: 800, height: 20 },
            { x: 200, y: 400, width: 100, height: 15 },
            { x: 400, y: 320, width: 120, height: 15 },
            { x: 600, y: 250, width: 100, height: 15 },
            { x: 300, y: 180, width: 80, height: 15 }
        ];
        
        // Power-ups
        let powerups = [];
        
        // Obstacles
        let obstacles = [];
        
        function createPowerup() {
            powerups.push({
                x: 200 + Math.random() * 400,
                y: 100 + Math.random() * 200,
                width: 20,
                height: 20,
                collected: false,
                type: 'fart'
            });
        }
        
        function createObstacle() {
            obstacles.push({
                x: 800,
                y: 450,
                width: 30,
                height: 40,
                speed: 3,
                color: '#ff6b6b'
            });
        }
        
        // Input handling
        const keys = {};
        document.addEventListener('keydown', (e) => keys[e.key] = true);
        document.addEventListener('keyup', (e) => keys[e.key] = false);
        
        function updateGame() {
            // Clear canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, 800, 600);
            
            // Player physics
            if (keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
            if (keys['ArrowRight'] && player.x < 760) player.x += player.speed;
            
            // Jump mechanics
            if (keys[' '] && !player.isJumping) {
                player.velocityY = -player.jumpPower;
                player.isJumping = true;
            }
            
            // Gravity
            player.velocityY += 0.5; // Gravity
            player.y += player.velocityY;
            
            // Platform collision
            player.isJumping = true;
            for (const platform of platforms) {
                if (player.x < platform.x + platform.width &&
                    player.x + player.width > platform.x &&
                    player.y < platform.y + platform.height &&
                    player.y + player.height > platform.y) {
                    player.y = platform.y - player.height;
                    player.velocityY = 0;
                    player.isJumping = false;
                }
            }
            
            // Update obstacles
            obstacles = obstacles.filter(obstacle => {
                obstacle.x -= obstacle.speed;
                
                // Check collision with player
                if (obstacle.x < player.x + player.width &&
                    obstacle.x + obstacle.width > player.x &&
                    obstacle.y < player.y + player.height &&
                    obstacle.y + obstacle.height > player.y) {
                    gameRunning = false;
                }
                
                return obstacle.x > -30; // Remove if off screen
            });
            
            // Update powerups
            powerups = powerups.filter(powerup => {
                // Check collision with player
                if (!powerup.collected &&
                    powerup.x < player.x + player.width &&
                    powerup.x + powerup.width > player.x &&
                    powerup.y < player.y + player.height &&
                    powerup.y + powerup.height > player.y) {
                    powerup.collected = true;
                    farts++;
                    score += 50;
                    scoreElement.textContent = score;
                    fartsElement.textContent = farts;
                }
                return !powerup.collected;
            });
            
            // Spawn obstacles and powerups
            if (Math.random() < 0.01) {
                createObstacle();
            }
            if (Math.random() < 0.005) {
                createPowerup();
            }
            
            // Draw platforms
            ctx.fillStyle = '#8b4513';
            for (const platform of platforms) {
                ctx.fillRect(platform.x, platform.y, platform.width, platform.height);
            }
            
            // Draw obstacles
            ctx.fillStyle = '#ff6b6b';
            for (const obstacle of obstacles) {
                ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
            }
            
            // Draw powerups
            for (const powerup of powerups) {
                ctx.fillStyle = '#4d7a5d';
                ctx.beginPath();
                ctx.arc(powerup.x + 10, powerup.y + 10, 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#d4af37';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            
            // Draw player
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            
            // Game over
            if (!gameRunning) {
                ctx.fillStyle = '#d4af37';
                ctx.font = '48px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', 400, 300);
                ctx.font = '24px Courier New';
                ctx.fillText(`Final Score: ${score}`, 400, 350);
                ctx.fillText(`Farts Collected: ${farts}`, 400, 380);
            }
        }
        
        // Game loop
        function gameLoop() {
            if (gameRunning) {
                updateGame();
            }
            requestAnimationFrame(gameLoop);
        }
        
        // Start game
        gameLoop();
    </script>
</body>
</html>
